<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoLab | Hafizah Nabilah</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: rgba(22, 27, 34, 0.8);
            --accent-color: #58a6ff;
            --neon-green: #39ff14;
            --text-color: #c9d1d9;
            --footer-text: #8b949e;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #161b22 0%, #0d1117 100%);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid #30363d;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            font-family: 'Fira Code', monospace;
            color: var(--accent-color);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5rem;
        }

        .subtitle {
            text-align: center;
            font-size: 0.8rem;
            color: var(--footer-text);
            margin-bottom: 1.5rem;
            font-family: 'Fira Code', monospace;
        }

        label { display: block; margin: 10px 0 5px; font-size: 0.9rem; font-weight: 600; }

        select, textarea, input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #010409;
            border: 1px solid #30363d;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            font-family: 'Fira Code', monospace;
        }

        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn-encrypt { background: var(--accent-color); color: white; }
        .btn-decrypt { background: transparent; border: 1px solid var(--accent-color); color: var(--accent-color); }
        
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        .result-container {
            margin-top: 20px;
            padding: 15px;
            background: rgba(56, 239, 125, 0.1);
            border-left: 4px solid var(--neon-green);
            border-radius: 4px;
        }

        .result-text {
            word-wrap: break-word;
            font-family: 'Fira Code', monospace;
            color: var(--neon-green);
        }

        /* Footer Informasi Mahasiswa */
        .identity-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed #30363d;
            text-align: center;
        }

        .identity-footer p {
            margin: 3px 0;
            font-size: 0.85rem;
            color: var(--footer-text);
        }

        .identity-name {
            color: var(--accent-color) !important;
            font-weight: bold;
            font-family: 'Fira Code', monospace;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Cipher Lab</h1>
    <p class="subtitle">Secure Communication Tools</p>
    
    <label>Pilih Algoritma</label>
    <select id="algo" onchange="toggleKeyInput()">
        <option value="caesar">Caesar Cipher (Abjad Tunggal)</option>
        <option value="vigenere">Vigenère Cipher (Abjad Majemuk)</option>
    </select>

    <label>Pesan</label>
    <textarea id="message" rows="3" placeholder="Ketik pesan di sini..."></textarea>

    <label id="keyLabel">Kunci (Angka pergeseran)</label>
    <input type="text" id="key" placeholder="Contoh: 3">

    <div class="grid">
        <button class="btn-encrypt" onclick="process(true)">Enkripsi</button>
        <button class="btn-decrypt" onclick="process(false)">Dekripsi</button>
    </div>

    <div class="result-container" id="resultBox" style="display:none;">
        <label>Hasil:</label>
        <div id="result" class="result-text"></div>
    </div>

    <div class="identity-footer">
        <p class="identity-name">Hafizah Nabilah</p>
        <p>NPM: 2310020044</p>
        <p>Mata Kuliah: Sistem Keamanan Informasi</p>
    </div>
</div>

<script>
    function toggleKeyInput() {
        const algo = document.getElementById('algo').value;
        const keyLabel = document.getElementById('keyLabel');
        const keyInput = document.getElementById('key');
        
        if(algo === 'caesar') {
            keyLabel.innerText = "Kunci (Angka pergeseran)";
            keyInput.placeholder = "Contoh: 3";
            keyInput.type = "number";
        } else {
            keyLabel.innerText = "Kunci (Kata Kunci)";
            keyInput.placeholder = "Contoh: RAHASIA";
            keyInput.type = "text";
        }
    }

    function caesar(text, shift, encrypt = true) {
        shift = parseInt(shift) || 0;
        if (!encrypt) shift = (26 - (shift % 26)) % 26;
        return text.split('').map(char => {
            if (char.match(/[a-z]/i)) {
                let code = char.charCodeAt(0);
                let base = (code >= 65 && code <= 90) ? 65 : 97;
                return String.fromCharCode(((code - base + shift) % 26) + base);
            }
            return char;
        }).join('');
    }

    function vigenere(text, key, encrypt = true) {
        let result = "";
        key = key.toUpperCase().replace(/[^A-Z]/g, '');
        if (key.length === 0) return "Kunci tidak valid!";
        
        let keyIndex = 0;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char.match(/[a-z]/i)) {
                let code = char.charCodeAt(0);
                let isUpper = (code >= 65 && code <= 90);
                let base = isUpper ? 65 : 97;
                
                let k = key[keyIndex % key.length].charCodeAt(0) - 65;
                if (!encrypt) k = (26 - k) % 26;
                
                result += String.fromCharCode(((code - base + k) % 26) + base);
                keyIndex++;
            } else {
                result += char;
            }
        }
        return result;
    }

    function process(isEncrypt) {
        const algo = document.getElementById('algo').value;
        const text = document.getElementById('message').value;
        const key = document.getElementById('key').value;
        let finalResult = "";

        if (algo === 'caesar') {
            finalResult = caesar(text, key, isEncrypt);
        } else {
            finalResult = vigenere(text, key, isEncrypt);
        }

        document.getElementById('result').innerText = finalResult;
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
