<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoLab 💖 Hafizah Nabilah</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0112; /* Ungu gelap super tua */
            --card-bg: rgba(15, 2, 25, 0.7);
            --main-pink: #ff007f; /* Pink Neon */
            --main-green: #39ff14; /* Hijau Neon */
            --text-color: #ffffff;
            --footer-text: #bda6d6;
            --glitch-space: rgba(255, 0, 127, 0.1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* --- ANIMASI BACKGROUND BERGERAK --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                repeating-linear-gradient(45deg, transparent, transparent 10px, var(--glitch-space) 10px, var(--glitch-space) 20px),
                radial-gradient(circle at 20% 30%, rgba(57, 255, 20, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 127, 0.1) 0%, transparent 40%);
            z-index: -1;
            animation: bgShift 10s infinite alternate linear;
        }

        @keyframes bgShift {
            0% { transform: scale(1); background-position: 0% 0%; }
            100% { transform: scale(1.1); background-position: 10% 10%; }
        }

        /* --- CONTAINER UTAMA --- */
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            border: 2px solid var(--main-pink);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.3), inset 0 0 15px rgba(57, 255, 20, 0.1);
            width: 100%;
            max-width: 500px;
            position: relative;
            animation: containerEntry 1s ease-out;
        }

        @keyframes containerEntry {
            0% { opacity: 0; transform: translateY(50px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* --- JUDUL DENGAN ANIMASI GLITCH & NEON --- */
        h1 {
            text-align: center;
            font-family: 'Fira Code', monospace;
            color: var(--main-green);
            margin-bottom: 0.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 2rem;
            text-shadow: 0 0 10px var(--main-green), 0 0 20px rgba(57, 255, 20, 0.5);
            position: relative;
            animation: glitch 3s infinite;
        }

        h1::before, h1::after {
            content: "Cipher Lab";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--card-bg);
        }
        h1::before { left: 2px; text-shadow: -2px 0 var(--main-pink); clip: rect(44px, 450px, 56px, 0); animation: glitchAnim 2s infinite linear alternate-reverse; }
        h1::after { left: -2px; text-shadow: -2px 0 var(--main-green); clip: rect(87px, 450px, 140px, 0); animation: glitchAnim2 3s infinite linear alternate-reverse; }

        @keyframes glitch { 0%, 100% { transform: rotate(-1deg); } 50% { transform: rotate(1deg); } }
        @keyframes glitchAnim { 0% { clip: rect(31px, 9999px, 94px, 0); } 100% { clip: rect(66px, 9999px, 14px, 0); } }
        @keyframes glitchAnim2 { 0% { clip: rect(89px, 9999px, 11px, 0); } 100% { clip: rect(10px, 9999px, 100px, 0); } }

        .subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: var(--main-pink);
            margin-bottom: 2rem;
            font-family: 'Fira Code', monospace;
            text-shadow: 0 0 5px var(--main-pink);
        }

        label { display: block; margin: 15px 0 5px; font-size: 0.95rem; font-weight: 600; color: var(--main-green); text-shadow: 0 0 5px rgba(57, 255, 20, 0.5); }

        /* --- INPUT ELEMENTS DENGAN ANIMASI BORDER --- */
        select, textarea, input {
            width: 100%;
            padding: 15px;
            margin-bottom: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid transparent;
            color: white;
            border-radius: 10px;
            box-sizing: border-box;
            font-family: 'Fira Code', monospace;
            transition: 0.3s ease;
            position: relative;
        }

        select { border-color: rgba(57, 255, 20, 0.3); color: var(--main-green); cursor: pointer; }
        textarea { border-color: rgba(255, 0, 127, 0.3); resize: none; }
        input { border-color: rgba(57, 255, 20, 0.3); }

        select:focus, textarea:focus, input:focus {
            outline: none;
            border-color: var(--main-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
            transform: scale(1.02);
        }

        textarea:focus { border-color: var(--main-pink); box-shadow: 0 0 15px rgba(255, 0, 127, 0.5); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }

        /* --- BUTTONS DENGAN ANIMASI HOVER SHAKE --- */
        button {
            padding: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            position: relative;
            overflow: hidden;
        }

        .btn-encrypt { 
            background: var(--main-pink); 
            color: white; 
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5); 
        }
        .btn-decrypt { 
            background: transparent; 
            border: 2px solid var(--main-green); 
            color: var(--main-green); 
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.3);
        }
        
        button:hover { 
            transform: translateY(-3px) scale(1.05); 
            box-shadow: 0 0 25px var(--main-pink);
        }
        .btn-decrypt:hover { box-shadow: 0 0 25px var(--main-green); }

        button:active { transform: translateY(1px) scale(1); }

        /* --- RESULT BOX DENGAN ANIMASI FADE IN & PULSE --- */
        .result-container {
            margin-top: 25px;
            padding: 20px;
            background: rgba(56, 239, 125, 0.05);
            border: 2px solid var(--main-green);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.2);
            animation: fadeInResult 0.5s ease-out, pulseGreen 2s infinite;
        }

        @keyframes fadeInResult { 0% { opacity: 0; transform: scale(0.9); } 100% { opacity: 1; transform: scale(1); } }
        @keyframes pulseGreen { 0%, 100% { box-shadow: 0 0 20px rgba(57, 255, 20, 0.2); } 50% { box-shadow: 0 0 30px rgba(57, 255, 20, 0.4); } }

        .result-text {
            word-wrap: break-word;
            font-family: 'Fira Code', monospace;
            color: white;
            text-shadow: 0 0 10px var(--main-green);
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* --- FOOTER IDENTITAS DENGAN ANIMASI FLOAT --- */
        .identity-footer {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 2px solid #2a1142;
            text-align: center;
            position: relative;
        }

        .identity-footer::before {
            content: "♥";
            color: var(--main-pink);
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
            background: var(--card-bg); padding: 0 10px; font-size: 1.2rem;
            text-shadow: 0 0 10px var(--main-pink);
            animation: heartBeat 1.5s infinite;
        }

        @keyframes heartBeat { 0%, 100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.2); } }

        .identity-footer p { margin: 5px 0; font-size: 0.9rem; color: var(--footer-text); transition: 0.3s; }
        .identity-footer p:hover { color: white; text-shadow: 0 0 5px white; }

        .identity-name {
            color: var(--main-pink) !important;
            font-weight: 700;
            font-family: 'Fira Code', monospace;
            font-size: 1.1rem !important;
            text-shadow: 0 0 10px var(--main-pink);
            animation: namePulse 2s infinite;
        }

        @keyframes namePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

    </style>
</head>
<body>

<div class="container">
    <h1>Cipher Lab</h1>
    <p class="subtitle">&lt;&lt; Security Systems &gt;&gt;</p>
    
    <label>Pilih Algoritma</label>
    <select id="algo" onchange="toggleKeyInput()">
        <option value="caesar">Caesar Cipher (Mono-Abjad)</option>
        <option value="vigenere">Vigenère Cipher (Poli-Abjad)</option>
    </select>

    <label>Pesan Asli / Sandi</label>
    <textarea id="message" rows="3" placeholder="Masukkan pesan rahasia..."></textarea>

    <label id="keyLabel">Kunci (Pergeseran Angka)</label>
    <input type="text" id="key" placeholder="Contoh: 3">

    <div class="grid">
        <button class="btn-encrypt" onclick="process(true)">Amankan (Encrypt)</button>
        <button class="btn-decrypt" onclick="process(false)">Buka (Decrypt)</button>
    </div>

    <div class="result-container" id="resultBox" style="display:none;">
        <label>Hasil Konversi:</label>
        <div id="result" class="result-text"></div>
    </div>

    <div class="identity-footer">
        <p class="identity-name">Hafizah Nabilah</p>
        <p>NPM: 2310020044</p>
        <p>Mata Kuliah: Sistem Keamanan Informasi</p>
    </div>
</div>

<script>
    // Menambahkan animasi mengetik otomatis pada placeholder
    const messageInput = document.getElementById('message');
    const placeholders = ["Ketik pesan rahasia di sini...", "ABC -> DEF (Caesar Key 3)", "HALO -> KQRR (Vigenere Key KODE)"];
    let phIndex = 0;
    
    setInterval(() => {
        messageInput.placeholder = placeholders[phIndex % placeholders.length];
        phIndex++;
    }, 4000);

    function toggleKeyInput() {
        const algo = document.getElementById('algo').value;
        const keyLabel = document.getElementById('keyLabel');
        const keyInput = document.getElementById('key');
        
        // Animasi kecil saat ganti input
        keyInput.style.transform = "scale(0.9)";
        setTimeout(() => keyInput.style.transform = "scale(1)", 200);

        if(algo === 'caesar') {
            keyLabel.innerText = "Kunci (Pergeseran Angka)";
            keyInput.placeholder = "Contoh: 3";
            keyInput.type = "number";
        } else {
            keyLabel.innerText = "Kunci (Kata Kunci)";
            keyInput.placeholder = "Contoh: RAHASIA";
            keyInput.type = "text";
        }
    }

    // --- LOGIKA KRIPTOGRAFI (Tetap Sama) ---

    function caesar(text, shift, encrypt = true) {
        shift = parseInt(shift) || 0;
        if (!encrypt) shift = (26 - (shift % 26)) % 26;
        return text.split('').map(char => {
            if (char.match(/[a-z]/i)) {
                let code = char.charCodeAt(0);
                let base = (code >= 65 && code <= 90) ? 65 : 97;
                return String.fromCharCode(((code - base + shift) % 26) + base);
            }
            return char;
        }).join('');
    }

    function vigenere(text, key, encrypt = true) {
        let result = "";
        key = key.toUpperCase().replace(/[^A-Z]/g, '');
        if (key.length === 0) return "⚠️ Kunci harus huruf!";
        
        let keyIndex = 0;
        for (let i = 0; i < text.length; i++) {
            let char = text[i];
            if (char.match(/[a-z]/i)) {
                let code = char.charCodeAt(0);
                let isUpper = (code >= 65 && code <= 90);
                let base = isUpper ? 65 : 97;
                
                let k = key[keyIndex % key.length].charCodeAt(0) - 65;
                if (!encrypt) k = (26 - k) % 26;
                
                result += String.fromCharCode(((code - base + k) % 26) + base);
                keyIndex++;
            } else {
                result += char;
            }
        }
        return result;
    }

    function process(isEncrypt) {
        const algo = document.getElementById('algo').value;
        const text = document.getElementById('message').value;
        const key = document.getElementById('key').value;
        const resultBox = document.getElementById('resultBox');
        let finalResult = "";

        if (!text || !key) {
            alert("Isi pesan dan kuncinya dulu ya, Hafizah! 😊");
            return;
        }

        if (algo === 'caesar') {
            finalResult = caesar(text, key, isEncrypt);
        } else {
            finalResult = vigenere(text, key, isEncrypt);
        }

        const resultDisplay = document.getElementById('result');
        resultDisplay.innerText = finalResult;
        resultBox.style.display = 'block';
        
        // Animasi teks hasil mengetik
        resultDisplay.style.width = "0";
        setTimeout(() => {
            resultDisplay.style.transition = "width 0.5s ease-out";
            resultDisplay.style.width = "100%";
        }, 100);
    }
</script>

</body>
</html>
